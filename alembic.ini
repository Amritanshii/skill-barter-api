# ============================================================
# Alembic Configuration
# ============================================================
# Usage:
#   Generate a migration:  alembic revision --autogenerate -m "add users table"
#   Apply all migrations:  alembic upgrade head
#   Rollback one step:     alembic downgrade -1
#   View history:          alembic history
# ============================================================

[alembic]
# Path to migrations folder
script_location = alembic

# Template for migration file names
# %(year)d%(month).2d%(day).2d_%(rev)s_%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Database URL — overridden by alembic/env.py which reads from app/config.py
# Do NOT hardcode credentials here
sqlalchemy.url = driver://user:pass@localhost/dbname

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
