databases:
  - name: skillbarter-db
    databaseName: skillbarter
    user: skillbarter
    plan: free

services:
  # Redis
  - type: redis
    name: skillbarter-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  # API (Docker)
  - type: web
    name: skillbarter-api
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillbarter-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: skillbarter-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: APP_ENV
        value: production
      # After deploying frontend, add its URL here:
      # - key: CORS_ORIGINS
      #   value: https://skillbarter-frontend.onrender.com

  # Frontend (Static site)
  - type: web
    name: skillbarter-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: skillbarter-api
          type: web
          property: host
